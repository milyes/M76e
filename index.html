
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Termux Toolkit Hub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
      background-color: #050505;
      color: #e5e5e5;
      overflow-x: hidden;
    }
    .mono {
      font-family: 'Fira Code', monospace;
    }
    
    /* Neon Dark Theme Utilities */
    .theme-neon .neon-emerald {
      text-shadow: 0 0 10px rgba(16, 185, 129, 0.5), 0 0 20px rgba(16, 185, 129, 0.3);
    }
    .theme-neon .neon-cyan {
      text-shadow: 0 0 10px rgba(6, 182, 212, 0.5), 0 0 20px rgba(6, 182, 212, 0.3);
    }
    .theme-neon .neon-border-emerald {
      box-shadow: 0 0 15px rgba(16, 185, 129, 0.1);
      border-color: rgba(16, 185, 129, 0.4);
    }
    .theme-neon .neon-border-cyan {
      box-shadow: 0 0 15px rgba(6, 182, 212, 0.1);
      border-color: rgba(6, 182, 212, 0.4);
    }
    .theme-neon .neon-bg-glow {
      background: radial-gradient(circle at center, rgba(16, 185, 129, 0.05) 0%, transparent 70%);
    }

    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: #0a0a0a;
    }
    ::-webkit-scrollbar-thumb {
      background: #222;
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #333;
    }

    /* Custom scrollbar for message areas */
    .custom-scrollbar::-webkit-scrollbar {
      width: 4px;
    }
    .custom-scrollbar::-webkit-scrollbar-thumb {
      background: #333;
    }
  </style>
